  namespace: default
spec:
  extAuth:
    grpc:
      backendRefs:
      - name: gatective-internal
        namespace: envoy-gateway-system
        port: 8080
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: test-gateway
